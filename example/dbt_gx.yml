test_mappings:
  # Standard dbt tests — override or extend built-in defaults
  unique:
    expectation: ExpectColumnValuesToBeUnique

  not_null:
    expectation: ExpectColumnValuesToNotBeNull

  # dbt_utils tests
  dbt_utils.at_least_one:
    expectation: ExpectColumnUniqueValueCountToBeBetween
    params:
      kwargs:
        min_value: 1

  # dbt_expectations tests
  dbt_expectations.expect_column_values_to_be_between:
    expectation: ExpectColumnValuesToBeBetween
    params:
      kwargs_mapping:
        min_value: min_value
        max_value: max_value

  # Example of a custom test with a conversion function
  custom_test:
    expectation: ExpectColumnValuesToMatchRegex
    function: my_package.converters.custom_test_converter
